bio: |
  I am a marine geologist studying volatile cycling in subduction zones and
  its role in magma generation and metallogenesis. My work combines isotope
  geochemistry, petrology, geochronology, and thermodynamic modeling to
  constrain carbon and water cycling in the Makran system and related
  subduction-to-collision magmatic systems.

