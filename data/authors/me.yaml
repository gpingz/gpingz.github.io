bio: |
  I am a marine geologist interested in Earth material cycles across
  environments, resources, oceans, crust, and mantle. My work connects
  sedimentary records, isotope geochemistry, petrology, ocean drilling, and
  data synthesis to understand environmental change, resource formation, and
  deep recycling of carbon, water, and other key materials.

